<!-- src/templates/emails/notification.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #667eea; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
    .content { padding: 30px; background: #f9f9f9; border-radius: 0 0 10px 10px; }
    .btn { display: inline-block; padding: 10px 25px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h2>🔔 {{title}}</h2>
  </div>
  <div class="content">
    <p>Bonjour <strong>{{name}}</strong>,</p>
    <p>{{message}}</p>
    {{#if details}}
    <div style="background: #fff; padding: 15px; border-radius: 5px; margin: 15px 0; border-left: 4px solid #667eea;">
      <ul style="list-style: none; padding: 0;">
        {{#each details}}
        <li><strong>{{@key}}:</strong> {{this}}</li>
        {{/each}}
      </ul>
    </div>
    {{/if}}
    {{#if actionUrl}}
    <p style="text-align: center; margin-top: 20px;">
      <a href="{{actionUrl}}" class="btn">{{actionLabel}}</a>
    </p>
    {{/if}}
  </div>
  <div class="footer">
    <p>© 2025 Djorssi Express</p>
  </div>
</body>
</html>
