# docker-compose.dev.yml
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: djorssi_postgres_dev
    environment:
      POSTGRES_USER: djorssi_user
      POSTGRES_PASSWORD: djorssi123!
      POSTGRES_DB: djorssi_express_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - djorssi_network_dev

  redis:
    image: redis:7-alpine
    container_name: djorssi_redis_dev
    ports:
      - "6380:6379"
    networks:
      - djorssi_network_dev

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: djorssi_app_dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5433
      DB_NAME: djorssi_express_db
      DB_USER: djorssi_user
      DB_PASSWORD: djorssi123!
      REDIS_HOST: redis
      REDIS_PORT: 6380
      JWT_SECRET: dev_secret_key_123
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - djorssi_network_dev
    command: npm start

volumes:
  postgres_data_dev:

networks:
  djorssi_network_dev:
    driver: bridge